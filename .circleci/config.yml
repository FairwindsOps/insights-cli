version: 2.1
orbs:
  rok8s: fairwinds/rok8s-scripts@15.0.1

references:
  install_vault: &install_vault
    run:
      name: install hashicorp vault
      command: |
        apk --update add curl yq
        cd /tmp
        curl -LO https://releases.hashicorp.com/vault/1.21.4/vault_1.21.4_linux_amd64.zip
        sha256sum vault_1.21.4_linux_amd64.zip | grep 889b681990fe221b884b7932fa9c9dd0ee9811b9349554f1aa287ab63c9f3dae
        unzip vault_1.21.4_linux_amd64.zip
        mv vault /usr/bin/vault
  setup_qemu_binfmt: &setup_qemu_binfmt
    run:
      name: Setup QEMU for multi-arch Docker builds
      command: |
        sudo apt-get update -y
        sudo apt-get install -y qemu-user-static binfmt-support
        docker buildx create --use || true
        docker buildx inspect --bootstrap

jobs:
  test:
    working_directory: /home/circleci/go/src/github.com/fairwindsops/insights-cli
    resource_class: large
    docker:
      # Note the goreleaser version is also referenced in the release and snapshot jobs.
      - image: goreleaser/goreleaser:v2.16.0
    steps:
      - checkout
      - run:
          name: lint
          command: |
            fmt_output=$(go fmt ./...)
            if [ ! -z "$fmt_output" ] ; then
              echo "The go fmt command reports these files need to be formatted, please fix this in the repository."
              echo "$output"
              exit 1
            fi
            wget -O- -nv https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin v2.11.2
            golangci-lint run -v --timeout 2m0s
      - run: ./.circleci/scripts/e2e-env.sh
      - *install_vault
      - rok8s/get_vault_env:
          vault_path: repo/insights-cli/env
      - run:
          name: test
          command: |
            go test -tags e2e ./...
            go vet ./...
  snapshot:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - *setup_qemu_binfmt
      - run:
          name: Run GoReleaser snapshot
          command: |
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$(pwd):/workspace" -w /workspace \
              -e CIRCLE_SHA1 -e CIRCLE_BRANCH -e CIRCLE_TAG \
              goreleaser/goreleaser:v2.15.4 release --snapshot --skip=sign
      - run: mkdir snapshot-artifacts && cp dist/*.tar.gz dist/*.txt dist/*.json snapshot-artifacts
      - store_artifacts:
          path: snapshot-artifacts
  e2e:
    working_directory: /home/circleci/go/src/github.com/fairwindsops/insights-cli
    resource_class: large
    docker:
      - image: goreleaser/goreleaser:v2.16.0
    steps:
      - checkout
      - run: ./.circleci/scripts/e2e-env.sh
      - *install_vault
      - rok8s/get_vault_env:
          vault_path: repo/global/env
      - rok8s/get_vault_env:
          vault_path: repo/insights-cli/env
      - run:
          name: lint and e2e tests
          command: |
            wget -O- -nv https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin v2.11.2
            golangci-lint run -v --timeout 2m0s
            go test -tags e2e ./pkg/...
            go vet ./...
  release:
    working_directory: /home/circleci/go/src/github.com/fairwindsops/insights-cli
    resource_class: large
    shell: /bin/bash
    docker:
      - image: goreleaser/goreleaser:v2.16.0
        environment:
          GO111MODULE: "on"
    steps:
      - checkout
      - setup_remote_docker
      - *install_vault
      - rok8s/get_vault_env:
          vault_path: repo/global/env
      - rok8s/get_vault_env:
          vault_path: repo/insights-cli/env
      - run:
          name: docker login
          command: |
            docker login -u _json_key -p "$(echo $GCP_ARTIFACTREADWRITE_JSON_KEY | base64 -d)" us-docker.pkg.dev
      # Remote Docker must emulate non-native platforms for GoReleaser's buildx targets (linux/arm64, linux/arm/v7); without binfmt.
      - run:
          name: Enable multi-arch emulation on remote Docker (QEMU binfmt)
          command: |
            docker run --rm --privileged tonistiigi/binfmt:latest --install all
      - run: goreleaser

workflows:
  version: 2
  test_and_build:
    jobs:
      - test
      - snapshot:
          requires:
            - test
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
  release:
    jobs:
      - e2e:
          context: org-global
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /.*/
      - release:
          context: org-global
          requires:
            - e2e
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /.*/
